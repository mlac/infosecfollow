# Synology Container Manager project for the infosecfollow runner.
# Deploy: clone this repo onto the NAS, copy .env.example to .env and fill it in,
# then build + start. See README.md for the full walkthrough.
services:
  infosecfollow:
    build: .
    image: infosecfollow-runner
    container_name: infosecfollow
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Drives both the cron schedule and the date stamps in the site.
      TZ: America/New_York
    volumes:
      # Bind-mount the repo checkout on the NAS into the container. The left side
      # must be the absolute path where you cloned this repo on the NAS; the
      # default is the standard Synology Docker shared folder. Adjust if needed.
      - /volume1/docker/infosecfollow:/data/infosecfollow
