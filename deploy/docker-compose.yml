# Synology Container Manager project for the infosecfollow runner.
# Builds straight from the public repo's deploy/ folder (no host git needed) and
# clones the app into a named Docker volume on first run. Deploy: create .env
# beside this file, then `docker compose up -d --build`. See README.md.
services:
  infosecfollow:
    build:
      # Remote git context: Docker fetches deploy/ from the public repo, so the
      # NAS needs no local checkout. Falls back to a prebuilt image (below) if
      # your Compose can't use a URL context — see README.
      context: "https://github.com/mlac/infosecfollow.git#main:deploy"
    image: infosecfollow-runner
    container_name: infosecfollow
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Drives both the cron schedule and the date stamps in the site.
      TZ: America/New_York
    volumes:
      - infosecfollow-data:/data/infosecfollow

volumes:
  infosecfollow-data:
