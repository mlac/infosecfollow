# Synology Container Manager project for the infosecfollow runner.
# Builds from a LOCAL context (this folder), so the Docker daemon needs no git.
# Fetch the build files (Dockerfile, run-briefing.sh, crontab) into this folder
# with curl first — see README — then `docker compose up -d --build`. The
# container clones the app into a named volume itself (its own bundled git).
services:
  infosecfollow:
    build: .
    image: infosecfollow-runner
    container_name: infosecfollow
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Drives both the schedule and the date stamps in the site.
      TZ: America/New_York
    volumes:
      - infosecfollow-data:/data/infosecfollow
    # Cap container logs at 3 x 10MB so they can't grow without bound.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  infosecfollow-data:
